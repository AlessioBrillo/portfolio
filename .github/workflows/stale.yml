name: Stale

on:
  schedule:
    - cron: '0 7 * * 1'

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-label: stale
          stale-issue-message: |
            This issue has been inactive for 90 days. It will be closed
            in 14 days if no further activity occurs.
          close-issue-message: |
            This issue was closed due to inactivity.
          stale-pr-label: stale
          stale-pr-message: |
            This PR has been inactive for 30 days. It will be closed
            in 14 days if no further activity occurs.
          close-pr-message: |
            This PR was closed due to inactivity.
          days-before-issue-stale: 90
          days-before-pr-stale: 30
          days-before-close: 14
          repo-token: ${{ secrets.GITHUB_TOKEN }}
